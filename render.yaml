services:
  - type: web
    name: fithub-app
    runtime: python
    plan: starter
    region: singapore
    buildCommand: python -m compileall .
    startCommand: python server.py
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PORT
        value: 10000
      - key: FITHUB_URL_PREFIX
        value: /
      - key: FITHUB_DATA_DIR
        value: /tmp/fithub
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FITHUB_SUPABASE_TABLE
        value: fithub_app_state
      - key: FITHUB_SUPABASE_ROW_ID
        value: primary
      - key: FITHUB_SUPABASE_BACKUP_RETENTION
        value: 96
