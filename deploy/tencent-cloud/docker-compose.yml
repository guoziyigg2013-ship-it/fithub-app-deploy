services:
  fithub-api:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: fithub-api
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "10000:10000"
    volumes:
      - fithub-data:/data/fithub
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/healthz' % os.getenv('PORT', '10000'), timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  fithub-data:
