<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fff8f0">
  <title>FitHub 运营审核后台</title>
  <link rel="stylesheet" href="admin.css?v=20260625-ops">
</head>
<body>
  <main class="admin-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">FITHUB OPS</p>
        <h1>运营审核后台</h1>
        <p class="hero-copy">集中处理举报、风险内容、媒体审核与账号注销申请。</p>
      </div>
      <a class="home-link" href="./">返回试用端</a>
    </section>

    <section class="token-card" aria-label="管理员令牌">
      <label>
        <span>管理员 Token</span>
        <input id="adminToken" type="password" autocomplete="off" placeholder="输入 FITHUB_ADMIN_TOKEN">
      </label>
      <button id="loadDashboard" type="button">加载后台</button>
    </section>

    <section class="status-line" id="adminStatus" aria-live="polite">等待加载审核数据。</section>

    <section class="summary-grid" id="summaryGrid" hidden></section>

    <section class="ops-layout" id="opsLayout" hidden>
      <article class="panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">REPORTS</p>
            <h2>用户举报</h2>
          </div>
          <span id="reportCount" class="count-pill">0</span>
        </div>
        <div id="reportsList" class="item-list"></div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">REVIEW</p>
            <h2>待审核内容</h2>
          </div>
          <span id="queueCount" class="count-pill">0</span>
        </div>
        <div id="queueList" class="item-list"></div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">ACCOUNT</p>
            <h2>注销申请</h2>
          </div>
          <span id="deletionCount" class="count-pill">0</span>
        </div>
        <div id="deletionList" class="item-list"></div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">ACTIONS</p>
            <h2>最近处理</h2>
          </div>
        </div>
        <div id="actionsList" class="item-list"></div>
      </article>
    </section>
  </main>

  <script src="config.js?v=20260624-cloudbase"></script>
  <script src="admin.js?v=20260625-ops"></script>
</body>
</html>
