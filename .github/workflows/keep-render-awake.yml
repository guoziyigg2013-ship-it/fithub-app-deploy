name: Keep Render Awake

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Render health endpoint
        env:
          TARGET_URL: https://fithub-app-1btg.onrender.com/healthz
        run: |
          echo "Pinging $TARGET_URL"
          curl --fail --silent --show-error --location --max-time 25 "$TARGET_URL"
